    <div class="reg">
      <h1>Registration Form</h1>
    
      
        <form action="homepage.html">

          <input type="radio" class="gender"name="gender"/><br /><br />

            <option value="INDIA"  class="country">INDIA</option>
            <option value="USA"  class="country">USA</option>
            <option value="ENGLAND"  class="country">ENGLAND</option>
            <option value="PAKISTAN"  class="country">PAKISTAN</option>
          </select><br><br>
         
         
       <input type="submit" value="submit" id="submit">

<!-- 7.4 Write a JavaScript program to create a slideshow that changes the displayed image when a next or previous button is clicked. -->
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <script>
    let images = ["img1.webp", "img2.webp", "img3.webp"];
    let index = 0;
    function nextimage() {
      index++;
      if (index >= images.length) {
        index = 0;
      }
      document.getElementById("IMG").src = images[index];
    }
    function previmage(){
        index--;
        if(index<0){
            index=images.length-1
        }
        document.getElementById("IMG").src = images[index]
    }
  </script>
  <body>
    <h1>SLIDESHOW OF IMAGES</h1>
    <img src="img1.webp" alt="" id="IMG" />
    <button onclick="nextimage()">next</button>
    <button onclick="previmage()">previous image</button>

  </body>
</html>

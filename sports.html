<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
   <link rel="stylesheet" href="sp.css">
  </head>
  <body>
   

    
    <div class="reg">
      <h1>Registration Form</h1>
    
      
        <form action="homepage.html">
          <label for="name" id="nam">FIRST NAME</label><br />
          <input type="text" id="name" placeholder="FIRST NAME" /><br /><br />
          <label for="last name" id="ln">LAST NAME</label><br />
          <input
            type="text"
            id="lastname"
            placeholder=" LAST NAME"
          /><br /><br />
          <label for="email" id="em">EMAIL</label><br />
          <input
            type="email"
            name="email"
            id="email"
            placeholder="ENTER YOUR EMAIL"
          /><br /><br />
          <label for="phone" id="ph">PHONE NUMBER</label><br />
          <input
            type="tel"
            name="phone"
            id="phone"
            placeholder=" ENTER YOUR NUMBER"
          /><br /><br />
          <label for="gender" id="gen">GENDER</label><br />
          <label for="male" name="gender" class="gender">MALE</label>
          <input type="radio"  name="gender" class="gender" />
          <label for="female" class="gender">FEMALE</label>
          <input type="radio" class="gender"name="gender"/><br /><br />
          <label for="country" id="spo">Select Your Sports</label><br>
          <select name="country" class="sport">
            <option value="INDIA"  class="sport">BasketBall</option>
            <option value="USA"  class="sport">Badminton</option>
            <option value="ENGLAND"  class="sport">Football</option>
            <option value="PAKISTAN"  class="sport">Table Tennis</option>
          </select><br><br>
         
         
       <input type="submit" value="SUBMIT" id="submit">
        </form>
      
    </div>
  </body>
</html>
